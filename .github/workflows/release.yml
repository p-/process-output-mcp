name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: "ubuntu-26.04"
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            label: linux
          - goos: linux
            goarch: arm64
            label: linux
          - goos: darwin
            goarch: arm64
            label: macOS
    steps:

      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: '1.26'

      - name: Build binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o process-output-mcp .

      - name: Package zip
        run: zip "process-output-mcp-${{ matrix.label }}-${{ matrix.goarch }}.zip" process-output-mcp README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: process-output-mcp-${{ matrix.label }}-${{ matrix.goarch }}
          path: process-output-mcp-${{ matrix.label }}-${{ matrix.goarch }}.zip

  upload:
    name: Upload Release Assets
    needs: build
    runs-on: "ubuntu-26.04"
    permissions:
      contents: write
    steps:

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload assets to release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: artifacts/*.zip
